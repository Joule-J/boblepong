<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bob L'éponge — Jeu de Poses</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Bangers&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="app-body">
      <div class="topbar">
        <nav class="topbar-modes">
          <button class="mode-tab active" data-screen="liveGeneratorScreen">
            Image Live
          </button>
          <button class="mode-tab" data-screen="guessModeScreen">
            Mode Niveaux
          </button>
        </nav>
        <div class="topbar-brand">
          <span class="topbar-title" id="topbarTitle">Bob L'eponge</span>
        </div>
      </div>

      <!-- SCREENS -->
      <div class="screens">

        <!-- ── LIVE GENERATOR ── -->
        <section id="liveGeneratorScreen" class="screen active">

          <!-- Camera stage -->
          <div class="stage">
            <div class="stage-header">
              <div class="stage-meta">
                <span class="stage-eyebrow">Caméra</span>
                <span class="stage-title">Prends la pose</span>
              </div>
              <button class="btn btn-primary btn-start" id="startLiveMode">▶ Jouer</button>
            </div>

            <div class="video-wrap">
              <canvas id="liveCanvas" class="pose-canvas"></canvas>
              <div class="video-overlay">
                <div id="liveSuccessBadge" class="badge badge-success hidden">✓ Matched</div>
              </div>
            </div>

            <div class="hints-bar" id="liveHints"></div>
          </div>

          <!-- Meme stage -->
          <div class="stage">
            <div class="stage-header">
              <div class="stage-meta">
                <span class="stage-eyebrow">Prédiction</span>
                <span class="stage-title" id="liveTargetTitle">En attente d'image…</span>
              </div>
            </div>

            <div class="meme-wrap">
              <img id="liveTargetImage" alt="" />
              <div class="meme-placeholder" id="livePlaceholder">
                <span class="ph-icon">◻</span>
                <p>Pose toi — l'image apparaît</p>
              </div>
              <div class="meme-label-bar" id="liveLabelBar" style="display:none">
                <span class="meme-name" id="liveMemeLabel">—</span>
                <span class="meme-tag">Image</span>
              </div>

            </div>
          </div>

        </section>

        <!-- ── LEVEL MODE ── -->
        <section id="guessModeScreen" class="screen">

          <!-- Meme target stage -->
          <div class="stage">
            <div class="stage-header">
              <div class="stage-meta">
                <span class="stage-eyebrow">Objectif</span>
                <span class="stage-title" id="guessLevelTitle">Niveau 1</span>
              </div>
              <div class="level-indicator">
                <span class="level-num" id="guessLevelCounter">0 / 0</span>
                <button class="btn btn-primary btn-start" id="startGuessMode">▶ Jouer</button>
              </div>
            </div>

            <div class="meme-wrap">
              <img id="guessTargetImage" alt="" />
              <div class="meme-placeholder" id="guessPlaceholder">
                <span class="ph-icon">◻</span>
                <p>Jouer — l'objectif apparaît</p>
              </div>
              <div class="meme-label-bar" id="guessLabelBar" style="display:none">
                <span class="meme-name" id="guessMemeLabel">—</span>
                <span class="meme-tag">Objectif</span>
              </div>
            </div>
          </div>

          <!-- Camera stage -->
          <div class="stage">
            <div class="stage-header">
              <div class="stage-meta">
                <span class="stage-eyebrow">Caméra</span>
                <span class="stage-title">Tiens la pose, passe le niveau</span>
              </div>
              <div id="guessSuccessBadge" class="badge badge-success hidden">✓ Suivant</div>
            </div>

            <div class="video-wrap">
              <canvas id="guessCanvas" class="pose-canvas"></canvas>
            </div>

            <div class="hints-bar" id="guessHints"></div>
          </div>

        </section>

      </div><!-- /screens -->
    </div><!-- /app-body -->

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
